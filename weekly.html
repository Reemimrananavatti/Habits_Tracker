<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Tracker - Weekly</title>
  <style>
    body{font-family:'Poppins',sans-serif;background:#f9f9f9;margin:0;padding:20px;}
    .tracker{max-width:1100px;margin:auto;background:#fff;padding:25px;border-radius:20px;box-shadow:0 8px 25px rgba(0,0,0,0.15);}
    h1{text-align:center;color:#d63384;}
    table{width:100%;border-collapse:collapse;}
    th,td{border:1px solid #ddd;padding:8px;text-align:center;}
    th{background:#ff69b4;color:#fff;}
    input[type="checkbox"]{transform:scale(1.3);accent-color:#ff69b4;}
    canvas{margin-top:30px;width:100%!important;max-height:350px;}
    .nav-buttons{display:flex;gap:10px;justify-content:center;margin-top:20px;}
    button{padding:10px 15px;border:none;background:#4CAF50;color:white;border-radius:5px;cursor:pointer;}
    button:hover{background:#45a049;}
  </style>
</head>
<body>
  <div class="tracker">
    <h1>🌸 Weekly Habits 🌸</h1>
    <table id="habitTable">
      <thead><tr id="dateRow"><th>Habit</th></tr></thead>
      <tbody id="habitBody"></tbody>
    </table>
    <canvas id="weeklyChart"></canvas>
    <div class="nav-buttons">
      <button onclick="location.href='index.html'">Daily View</button>
      <button onclick="location.href='monthly.html'">Monthly View</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // Grouped habits by prayer times
    const habitGroups = {
      "Fajr":["Namaz, dua, tasbih","Surah Baqrah","Health: yoga, breathing"],
      "Dhuhr":["Quran","Study: daily complete 2 tasks"],
      "Asr":["Learn something Islamic new for 5 min","Parents: daily check-in calls","In-laws: respectful communication"],
      "Maghrib":["Son: food, play, bedtime stories","Husband: meals, emotional bonding with communication"],
      "Isha":["Plan next day before bed","Sleep: 6 hours at least"]
    };
    const habits = Object.values(habitGroups).flat();

    const habitBody=document.getElementById("habitBody");
    const dateRow=document.getElementById("dateRow");

    // Generate current week dates (Thursday to Wednesday)
    function getWeekDates(){
      const today=new Date(); const dayOfWeek=today.getDay();
      const thursday=new Date(today); thursday.setDate(today.getDate()-((dayOfWeek-4+7)%7));
      let dates=[]; for(let i=0;i<7;i++){let d=new Date(thursday); d.setDate(thursday.getDate()+i); dates.push(d);} return dates;
    }
    const weekDates=getWeekDates();

    // Build table headers
    weekDates.forEach(d=>{
      const th=document.createElement("th");
      th.textContent=d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
      dateRow.appendChild(th);
    });

    // Build habit rows grouped by prayer times
    Object.keys(habitGroups).forEach(prayer=>{
      const headerRow=document.createElement("tr");
      const headerCell=document.createElement("td");
      headerCell.colSpan=weekDates.length+1;
      headerCell.textContent=prayer;
      headerCell.style.fontWeight="bold";
      headerRow.appendChild(headerCell);
      habitBody.appendChild(headerRow);

      habitGroups[prayer].forEach(habit=>{
        const row=document.createElement("tr");
        const tdHabit=document.createElement("td"); tdHabit.textContent=habit; row.appendChild(tdHabit);
        weekDates.forEach(d=>{
          const td=document.createElement("td");
          const checkbox=document.createElement("input"); checkbox.type="checkbox"; checkbox.dataset.habit=habit; checkbox.dataset.date=d.toDateString();
          if(localStorage.getItem(`${habit}-${d.toDateString()}`)==="true") checkbox.checked=true;
          checkbox.addEventListener("change",()=>{localStorage.setItem(`${habit}-${d.toDateString()}`,checkbox.checked); updateChart();});
          td.appendChild(checkbox); row.appendChild(td);
        });
        habitBody.appendChild(row);
      });
    });

    // Chart.js weekly completion chart
    const ctx=document.getElementById("weeklyChart").getContext("2d");
    let chart=new Chart(ctx,{
      type:"bar",
      data:{labels:habits,datasets:[{label:"Weekly Completion (%)",data:Array(habits.length).fill(0),backgroundColor:"rgba(255,105,180,0.7)",borderRadius:12}]},
      options:{scales:{y:{beginAtZero:true,max:100,ticks:{callback:v=>v+"%"}}},plugins:{legend:{display:false}}}
    });

    function updateChart(){
      habits.forEach((habit,i)=>{
        let completed=0;
        weekDates.forEach(d=>{if(localStorage.getItem(`${habit}-${d.toDateString()}`)==="true") completed++;});
        chart.data.datasets[0].data[i]=(completed/weekDates.length)*100;
      });
      chart.update();
    }
    updateChart();

    // Auto-clear today's checkboxes at 12:00 am
    function scheduleResetAtMidnight(){
      const now=new Date();
      let resetTime=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,0,0); // next midnight
      const msUntilReset=resetTime-now;
      setTimeout(()=>{
        habits.forEach(habit=>{
          const todayKey=`${habit}-${new Date().toDateString()}`;
          localStorage.removeItem(todayKey);
        });
        location.reload();
        scheduleResetAtMidnight();
      },msUntilReset);
    }
    scheduleResetAtMidnight();
  </script>
</body>
</html>
