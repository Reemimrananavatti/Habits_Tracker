<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Tracker - Monthly</title>
  <style>
    body { font-family: 'Poppins', sans-serif; background: #f9f9f9; margin: 0; padding: 20px; }
    .tracker { max-width: 900px; margin: auto; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
    h1 { text-align: center; color: #d63384; }
    canvas { margin-top: 30px; width: 100% !important; max-height: 400px; }
    .nav-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
    button { padding: 10px 15px; border: none; background: #4CAF50; color: white; border-radius: 5px; cursor: pointer; }
    button:hover { background: #45a049; }
  </style>
</head>
<body>
  <div class="tracker">
    <h1>📅 Monthly Progress 📅</h1>
    <canvas id="monthlyChart"></canvas>
    <div class="nav-buttons">
      <button onclick="location.href='index.html'">Daily View</button>
      <button onclick="location.href='weekly.html'">Weekly View</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const habits = [
      "Namaz, dua, tasbih","Surah Baqrah","Quran","Learn something Islamic new for 5 min",
      "Health: yoga, breathing","Sleep: 6 hours at least","Study: daily complete 2 tasks",
      "Son: food, play, bedtime stories","Husband: meals, emotional bonding with communication",
      "Parents: daily check-in calls","In-laws: respectful communication","Plan next day before bed"
    ];

    function getPastDates(days) {
      let dates = [];
      for (let i = 0; i < days; i++) {
        let d = new Date();
        d.setDate(d.getDate() - i);
        dates.push(d.toDateString());
      }
      return dates;
    }

    const past28Days = getPastDates(28);

    const data = habits.map(habit => {
      let completed = 0;
      past28Days.forEach(date => {
        if (localStorage.getItem(`${habit}-${date}`) === "true") completed++;
      });
      return (completed / past28Days.length) * 100;
    });

    const ctx = document.getElementById("monthlyChart").getContext("2d");
    new Chart(ctx, {
      type: "bar",
      data: { labels: habits, datasets: [{ label: "Monthly Completion (%)", data, backgroundColor: "rgba(255,105,180,0.7)", borderRadius: 12 }] },
      options: { scales: { y: { beginAtZero: true, max: 100, ticks: { callback: v => v + "%" } } }, plugins: { legend: { display: false } } }
    });
  </script>
</body>
</html>
